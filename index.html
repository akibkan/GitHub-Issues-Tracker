<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page in github issue tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
 
    <!-- daisyUI and tailwind cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script
 src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
</script>
<!-- fond-awesome cdn  -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    
<section class="w-11/12 md:w-6/12 lg:w-5/12 mx-auto mt-18 bg-base-100 shadow-xl">
    <div class="space-y-2 text-center">
        <div class="flex justify-center my-3">
            <img src="./assets/github-logo.png" alt="">
        </div>
        <h2 class="text-[24px] font-semibold">GitHub Issues Tracker</h2>
        <p class="text-[#64748B] font-normal">Sign in to manage your issues</p>
    </div>
    <div class="card  w-full max-w-sm shrink-0 mx-auto">
        <div class="card-body">
            <fieldset class="fieldset">
                <label class="font-medium">Username</label>
                <input id="input-name" type="text" class="input w-full" placeholder="Enter Username" />
                <p class="text-[#4A00FF]">Default: admin</p>
                <label class="font-medium">Password</label>
                <input id="input-pass" type="password" class="input w-full" placeholder="Enter Password" />
                <p class="text-[#4A00FF]">Default: admin123</p>
                <button id="signIn-btn" class="btn btn-primary mt-4">Sign in</button>
            </fieldset>
        </div>
    </div>
    <div class="divider">OR</div>
    <p class="text-center text-[#64748B]">Demo Credentials:</p>
    <div class="text-center bg-[#f8fafc] rounded-md p-7 mt-2 mb-6">
        <p> <span class="font-semibold">Username:</span> admin</p>
        <p> <span class="font-semibold">Password:</span> admin123</p>
    </div>
</section>





<script src="./script.js"></script>
</body>
