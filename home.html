            <div class="flex " >
                <img class="w-10" src="./assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class=" items-center flex gap-8 mr-15">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor">  
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="input-search" type="search" required placeholder="Search issues..." />
                </label>
                            <div class="flex">
                <button id="btn-search" class="btn btn-primary">+ New Issue</button>
            </div>
            </div>

        </div>
    </nav>

    <!-- button section  -->
    <section>
        <div class=" w-9/12 mx-auto bg-white shadow  mt-12 p-6 rounded-md">
            <button onclick="switchTab('all')" id="tab-all" class="btn btn-primary px-9">All</button>
            <button onclick="switchTab('open')" id="tab-open" class="btn  px-7">Open</button>
            <button onclick="switchTab('closed')" id="tab-closed" class="btn px-7">Closed</button>
        </div>
    </section>

    <!-- loading spinner  -->
    <div id="loading-spinner" class="h-[50vh] flex justify-center items-center hidden">
        <span class="loading loading-spinner loading-xl"></span>
    </div>

    <!-- issues counts var  -->
    <section>
        <div class="w-9/12 mx-auto bg-white shadow mb-15">
            <div class=" bg-white shadow  mt-12 p-6 rounded-md flex flex-col gap-4 md:flex-row justify-between items-center"> 
            <div class="flex items-center gap-2">
                <img class="bg-base-200 p-3 rounded-full" src="./assets/Aperture.png" alt="">
                <div>
                    <p id="issue-count" class="font-semibold text-[20px]">50 Issues</p>
                    <p class="text-[#64748b]">Track and manage your project issues</p>
                </div>
            </div>
            <div>
                <div class="badge bg-green-500 badge-xs"></div>
                <span class="font-medium">Open</span>
                <div class="badge bg-[#a855f7] badge-xs"></div>
                <span class="font-medium">Closed</span>
            </div>
        </div>

            <!-- main section  -->
    <section class=" ">
        <div id="issues-container" class=" grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 p-8 gap-x-5">

            
        </div>

        
    </section>
            </div>

    </section>
